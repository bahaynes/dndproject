apiVersion: v1
kind: Pod
metadata:
  name: dnd-westmarches
  labels:
    app: dnd-westmarches
spec:
  securityContext:
    fsGroup: 1000  # Ensure PVC volume mounts are writable by the app user (uid 1000)
  containers:
    - name: backend
      image: localhost/dnd-backend:latest
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
      ports:
        - containerPort: 8000
      env:
        - name: DATABASE_URL
          value: "sqlite:////data/app.db"
        - name: PYTHONPATH
          value: "/app"
        - name: MODE
          value: "prod"
        - name: ONESHOT_OUTPUT_DIR
          value: "/data/oneshots"
        - name: LLM_API_BASE
          value: "https://openrouter.ai/api/v1"
        - name: LLM_MODEL
          value: "deepseek/deepseek-chat"
        - name: LLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: llm-api-key
              key: token
        - name: PORT
          value: "8000"
        - name: DISCORD_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: discord-client-id
              key: id
        - name: DISCORD_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: discord-client-secret
              key: secret
        - name: DISCORD_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: discord-bot-token
              key: token
        - name: DISCORD_REDIRECT_URI
          value: "https://westmarches.bahaynes.com/api/auth/discord/callback"
        - name: ADMIN_DISCORD_IDS
          valueFrom:
            secretKeyRef:
              name: admin-discord-ids
              key: ids
      command: ["sh", "-c", "alembic upgrade head && gunicorn -c gunicorn_conf.py app.main:app"]
      imagePullPolicy: Never
      volumeMounts:
        - name: backend-data
          mountPath: /data
    - name: frontend
      image: localhost/dnd-frontend:latest
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
      imagePullPolicy: Never
      ports:
        - containerPort: 80
          hostPort: 9080
        - containerPort: 443
          hostPort: 9443
      env:
        - name: CLOUDFLARE_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: cloudflare-token
              key: token
              optional: true
      volumeMounts:
        - name: caddy-data
          mountPath: /data
        - name: caddy-config
          mountPath: /config
  volumes:
    - name: backend-data
      persistentVolumeClaim:
        claimName: dnd-backend-data
    - name: caddy-data
      persistentVolumeClaim:
        claimName: dnd-caddy-data
    - name: caddy-config
      persistentVolumeClaim:
        claimName: dnd-caddy-config
