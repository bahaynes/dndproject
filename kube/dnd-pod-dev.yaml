apiVersion: v1
kind: Pod
metadata:
  name: dnd-westmarches-dev
  labels:
    app: dnd-westmarches-dev
spec:
  hostNetwork: ${POD_HOST_NETWORK}
  containers:
    - name: backend
      image: localhost/dnd-backend-dev:latest
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
      command: ["sh", "-c", "cp /pyproject.toml . 2>/dev/null || true; uv sync --no-cache && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"]
      ports:
        - containerPort: 8000
          hostPort: 8000
      env:
        - name: DATABASE_URL
          value: "${DATABASE_URL}"
        - name: PYTHONPATH
          value: "/app"
        - name: DISCORD_CLIENT_ID
          value: "${DISCORD_CLIENT_ID}"
        - name: DISCORD_CLIENT_SECRET
          value: "${DISCORD_CLIENT_SECRET}"
        - name: DISCORD_BOT_TOKEN
          value: "${DISCORD_BOT_TOKEN}"
        - name: DISCORD_REDIRECT_URI
          value: "${DISCORD_REDIRECT_URI}"
        - name: FRONTEND_URL
          value: "${FRONTEND_URL}"
        - name: ADMIN_DISCORD_IDS
          value: "${ADMIN_DISCORD_IDS}"
      volumeMounts:
        - name: backend-src
          mountPath: /app
        - name: backend-data
          mountPath: /data
    - name: frontend
      image: localhost/dnd-frontend-dev:latest
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      # Ensure metadata is generated and dependencies are ready when volume is mounted
      command: ["sh", "-c", "pnpm install && pnpm svelte-kit sync && pnpm run dev --host"]
      env:
        - name: CI
          value: "true"
      ports:
        - containerPort: 5173
          hostPort: 5173
      volumeMounts:
        - name: frontend-src
          mountPath: /app
        - name: frontend-node-modules
          mountPath: /app/node_modules
    - name: postgres
      image: docker.io/library/postgres:15-alpine
      env:
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_PASSWORD
          value: "postgres"
        - name: POSTGRES_DB
          value: "dnd_westmarches"
      ports:
        - containerPort: 5432
          hostPort: 5432
      volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
  volumes:
    - name: backend-src
      hostPath:
        path: ./backend
        type: Directory
    - name: frontend-src
      hostPath:
        path: ./frontend
        type: Directory
    - name: backend-data
      hostPath:
        path: ./data
        type: DirectoryOrCreate
    - name: postgres-data
      hostPath:
        path: ./data/postgres
        type: DirectoryOrCreate
    - name: frontend-node-modules
      emptyDir: {}
